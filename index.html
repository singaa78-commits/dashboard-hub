<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GROWTH DASHBOARD</title>
    <meta name="description" content="Growth dashboard links." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="dashboard-listing">
        <h1 class="page-title">GROWTH DASHBOARD</h1>
        <div id="dashboard-list" class="dashboard-list" aria-live="polite"></div>
      </main>
    </div>

    <template id="card-template">
      <article class="dashboard-card">
        <div class="card-surface">
          <div class="card-top">
            <span class="dashboard-date"></span>
            <span class="dashboard-status"></span>
          </div>
          <span class="dashboard-badge"></span>
          <h2 class="dashboard-title"></h2>
          <div class="dashboard-meta">
            <span class="dashboard-chip dashboard-state-chip"></span>
            <span class="dashboard-chip dashboard-updated-chip"></span>
          </div>
        </div>
        <div class="card-footer">
          <span class="dashboard-updated-label"></span>
          <a class="dashboard-link" target="_blank" rel="noreferrer noopener"></a>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
